<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Mobile menu</title>
</head>
<body>
    <section class="mobile">
        <div class="container">
            <nav class="mobile__header">
                <button class="mobile__button mobile__button-close"></button>
                <div class="logo">
                    <a class="logo__link" href="#">
                        <img class="logo__link-img" src="img/group.svg" alt="logo">
                    </a>
                </div>
                <button class="mobile__button mobile__button-search"></button>
            </nav>
        </div>
        <div class="container">
            <div class="mobile__menu">
                <ul class="menu__list">
                    <li class="menu__item">
                        <a href="#" class="menu__link menu__link-active">Ремонт техники</a>
                    </li>
                    <li class="menu__item">
                        <a href="#" class="menu__link">Услуги и сервисы</a>
                    </li>
                    <li class="menu__item">
                        <a href="#" class="menu__link">Корпоративным клиентам</a>
                    </li>
                    <li class="menu__item">
                        <a href="#" class="menu__link">Продавцам техники</a>
                    </li>
                    <li class="menu__item">
                        <a href="#" class="menu__link">Партнерам</a>
                    </li>
                    <li class="menu__item">
                        <a href="#" class="menu__link">Производителям</a>
                    </li>
                    <li class="menu__item">
                        <a href="#" class="menu__link">Наши сервисные центры</a>
                    </li>
                    <li class="menu__item">
                        <a href="#" class="menu__link">Контакты</a>
                    </li>
                </ul>
            </div>
        </div>
        <div class="container">
            <div class="mobile__footer">
                <div class="footer__buttons">
                    <button class="mobile__button mobile__button-call"></button>
                    <button class="mobile__button mobile__button-chat"></button>
                    <button class="mobile__button mobile__button-profile"></button>
                </div>
                <div class="footer__contacts">
                    <a class="contacts__link contacts__link-mail" href="mailto:mail@cps.com">mail@cps.com</a>
                    <a class="contacts__link contacts__link-phone" href="tel:+380985554433">8 800 890 8900</a>
                </div>
                <div class="footer__languages">
                    <a href="#" class="footer__language footer__language-active">RU</a>
                    <a href="#" class="footer__language">EN</a>
                    <a href="#" class="footer__language">CH</a>
                </div>
            </div>
        </div>

    </section>

</body>
</html>

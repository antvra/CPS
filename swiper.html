<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link
  rel="stylesheet"
  href="https://unpkg.com/swiper@7/swiper-bundle.min.css"
/>
    <title>Swiper</title>
</head>
<body>

    <section class="software">
        <div class="container">
            <div class="software__title">
                Ремонт техники различных брендов
            </div>
            <div class="software__content">

                <div class="swiper mySwiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide">
                            <div class="software__content-item">
                                <div class="software__content-img">
                                    <img class="content-img_logo" src="img/lenovologo.png" alt="brand__logo">
                                </div>
                                <button class="software__content-btn"></button>
                            </div>
                        </div>
                        <div class="swiper-slide">
                            <div class="software__content-item">
                                <div class="software__content-img">
                                    <img class="content-img_logo" src="img/lenovologo.png" alt="brand__logo">
                                </div>
                                <button class="software__content-btn"></button>
                            </div>
                        </div>
                        <div class="swiper-slide">
                            <div class="software__content-item">
                                <div class="software__content-img">
                                    <img class="content-img_logo" src="img/lenovologo.png" alt="brand__logo">
                                </div>
                                <button class="software__content-btn"></button>
                            </div>
                        </div>





                    </div>
                    <div class="swiper-pagination"></div>
                </div>




                  <!-- <div class="software__content-item">
                    <div class="software__content-img">
                        <img src="img/lenovologo.png" alt="brand__logo">
                    </div>
                    <button class="software__content-btn"></button>
                </div> -->




            </div>
        </div>
    </section>








<script src="https://unpkg.com/swiper@7/swiper-bundle.min.js"></script>

<script>
var swiper = new Swiper(".mySwiper", {
        spaceBetween: 30,
        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },
      });
  </script>

</body>
</html>

<script src="https://unpkg.com/swiper@7/swiper-bundle.min.js"></script>

<script>

    let swiperElements = document.querySelector('.mobileversion');
    let notSwiperElements = document.querySelector('.hidden');


    if(document.documentElement.clientWidth < 768){
        swiperElements.classList.remove('mobileversion');
        var swiper = new Swiper(".mySwiper", {
        slidesPerView: "auto",
        spaceBetween: 10,
        pagination: {
          el: ".swiper-pagination",
          clickable: true,
        },
      });
    }

    else{
        notSwiperElements.classList.remove('hidden')
    }





    const vision = document.querySelector('.vision > span');
    let checkHidden = document.querySelectorAll('.software__content-item.hidden');
    let img = document.querySelector('.vision__img');


    if(document.documentElement.clientWidth <= 768){
        vision.addEventListener('click', function(){
        if (vision.innerHTML === 'Показать все') {
            img.classList.add('rotate');
            vision.innerHTML = 'Скрыть все';
            for(let i = 0; i < checkHidden.length; i++) {
                checkHidden[i].classList.remove('hidden');
            }
        }
        else{
            vision.innerHTML = 'Показать все';
            for(let i = 0; i < checkHidden.length; i++) {
                checkHidden[i].classList.add('hidden');
            }
            img.classList.remove('rotate');
        }

    })
    }

    if(document.documentElement.clientWidth >= 1120) {
        for(let i = 0; i < 2; i++) {
                checkHidden[i].classList.remove('hidden');
            }

        vision.addEventListener('click', function(){
        if (vision.innerHTML === 'Показать все') {
            img.classList.add('rotate');
            vision.innerHTML = 'Скрыть все';
            for(let i = 2; i < checkHidden.length; i++) {
                checkHidden[i].classList.remove('hidden');
            }
        }
        else{
            vision.innerHTML = 'Показать все';
            for(let i = 2; i < checkHidden.length; i++) {
                checkHidden[i].classList.add('hidden');
            }
            img.classList.remove('rotate');
        }

    })


    }
